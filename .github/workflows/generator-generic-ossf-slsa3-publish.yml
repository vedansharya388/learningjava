# This workflow lets you generate SLSA provenance file for your project.
# The generation satisfies level 3 for the provenance requirements - see https://slsa.dev/spec/v0.1/requirements
# The project is an initiative of the OpenSSF (openssf.org) and is developed at
# https://github.com/slsa-framework/slsa-github-generator.
# The provenance file can be verified using https://github.com/slsa-framework/slsa-verifier.
# For more information about SLSA and how it improves the supply-chain, visit slsa.dev.

name: SLSA generic generator
on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      digests: ${{ steps.hash.outputs.digests }}

    steps:
      - uses: actions/checkout@v4

      # ========================================================
      #
      # Step 1: Build your artifacts.
      #
      # ========================================================
      - name: Build artifacts
        run: |
            # These are some amazing artifacts.
            echo "artifact1" > artifact1
            echo "artifact2" > artifact2

      # ========================================================
      #
      # Step 2: Add a step to generate the provenance subjects
      #         as shown below. Update the sha256 sum arguments
      #         to include all binaries that you generate
      #         provenance for.
      #
      # ========================================================
      - name: Generate subject for provenance
        id: hash
        run: |
          set -euo pipefail

          # List the artifacts the provenance will refer to.
          files=$(ls artifact*)
          # Generate the subjects (base64 encoded).
          echo "hashes=$(sha256sum $files | base64 -w0)" >> "${GITHUB_OUTPUT}"

  provenance:
    needs: [build]
    permissions:
      actions: read   # To read the workflow path.
      id-token: write # To sign the provenance.
      contents: write # To add assets to a release.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v1.4.0
    with:
      base64-subjects: "${{ needs.build.outputs.digests }}"
      upload-assets: true # Optional: Upload to a new release
# This workflow generates SLSA Level 3 provenance for your release artifacts
# Verifiable at https://slsa.dev
name: SLSA Provenance Generator
on:
  workflow_dispatch:
  release:
    types: [created]

env:
  ARTIFACTS_DIR: artifacts

jobs:
  build:
    name: Build & Generate Subjects
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full git history for reproducibility

      - name: Setup build environment
        # Add your language-specific setup here
        run: |
          # Example: Rust
          # rustup toolchain install stable
          # Example: Go
          # go version
          # Example: Node
          # node --version
          echo "Build environment ready"

      - name: Create artifacts directory
        run: mkdir -p ${{ env.ARTIFACTS_DIR }}

      - name: Build artifacts
        run: |
          set -euo pipefail
          
          # ========================================================
          # REPLACE THIS SECTION WITH YOUR ACTUAL BUILD COMMANDS
          # ========================================================
          
          # Example: Rust release build
          # cargo build --release
          # mv target/release/my-binary ${{ env.ARTIFACTS_DIR }}/my-binary
          
          # Example: Go build
          # GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o ${{ env.ARTIFACTS_DIR }}/my-binary
          
          # Example: Node.js
          # npm ci
          # npm run build
          # zip -r ${{ env.ARTIFACTS_DIR }}/app.zip dist/
          
          # Example: Generic build
          echo "v$(git describe --tags --abbrev=0)" > ${{ env.ARTIFACTS_DIR }}/version.txt
          echo "build-$(date -u +%Y%m%d-%H%M%S)" > ${{ env.ARTIFACTS_DIR }}/build-info.txt
          
          # ========================================================
          # END CUSTOM BUILD SECTION
          # ========================================================

      - name: Generate provenance subjects
        id: hash
        run: |
          set -euo pipefail
          
          # List ALL artifacts that need provenance
          ARTIFACT_FILES=$(find ${{ env.ARTIFACTS_DIR }} -type f | sort | xargs)
          
          if [ -z "$ARTIFACT_FILES" ]; then
            echo "No artifacts found!" >&2
            exit 1
          fi
          
          echo "Artifacts: $ARTIFACT_FILES"
          
          # Generate base64-encoded SHA256 digests (SLSA format)
          HASHES=$(sha256sum $ARTIFACT_FILES | base64 -w0)
          
          echo "hashes=$HASHES" >> $GITHUB_OUTPUT
          echo "Files listed: $ARTIFACT_FILES"

      - name: Upload artifacts (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: ${{ env.ARTIFACTS_DIR }}/
          retention-days: 7

  provenance:
    name: Generate SLSA Provenance
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    permissions:
      actions: read      # Read workflow files
      id-token: write    # Sign provenance with OIDC
      contents: write    # Upload to release
      checks: write      # Optional: upload as check

    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v1.4.0
    with:
      base64-subjects: ${{ needs.build.outputs.hashes }}
      upload-to-github-release: true

  verify:
    name: Verify Provenance (optional)
    runs-on: ubuntu-latest
    needs: [provenance]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install slsa-verifier
        run: |
          curl -LO https://github.com/slsa-framework/slsa-verifier/releases/latest/download/slsa-verifier-linux-amd64
          chmod +x slsa-verifier-linux-amd64
          sudo mv slsa-verifier-linux-amd64 /usr/local/bin/slsa-verifier
      
      - name: Download artifacts & provenance
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      
      - name: Verify provenance
        run: |
          # Download provenance from release (adjust as needed)
          PROVENANCE_URL="https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}/assets"
          echo "Verification complete - check logs for details"
